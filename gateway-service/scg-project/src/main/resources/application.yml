server:
  port: 8081

# 限流算法切换开关
limiter:
  type: redis      # 使用 Redis 令牌桶



spring:
  jmx:
    enabled: false
  application:
    name: scg-gateway #给应用起名字



  #redis相关配置，springboot提供了自动配置类，自动根据这些配置创建一个jedispool连接池对象，供程序使用
  data:
    redis: #redis相关配置
      host: localhost  #redis服务器地址，默认是本机
      port: 6379 #redis服务器端口，默认是6379
      password: #redis服务器密码
      database: 0  #使用第0个数据库。redis数据库索引，默认是0，redis可以有多个数据库，通过索引区分
      timeout: 2000 #连接超时时间
      jedis:
        pool: #连接池配置
          max-active: 8
          max-idle: 8 #最多8个空闲连接
          min-idle: 0
          max-wait: 1000 #借连接等待时间，超过这个时间还没有获取到连接，就抛出异常
      # 新增：Lettuce 连接池配置（用于响应式Redis操作）
      lettuce:
        pool:
          max-active: 8      # 最大连接数
          max-idle: 8        # 最大空闲连接
          min-idle: 0        # 最小空闲连接
          max-wait: 1000     # 连接池满时等待时间（毫秒）

  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowed-origins: 
              - "http://localhost:5170"
            allowed-methods: 
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowed-headers: "*"
            allow-credentials: true
            max-age: 3600

      routes:
              # 优先处理 /ping 健康检查请求
      - id: ping-route
        uri: forward:/ping
        predicates:
          - Path=/ping
        
      - id: user-service
        uri: http://localhost:8082
        predicates:
          - Path=/api/user/**
      
      # 新增：用于压测的三个接口路由
      - id: user-service-test
        uri: http://localhost:8082
        predicates:
          - Path=/api/light, /api/heavy, /api/error

      - id: test-rate-limit
        uri: http://localhost:8082
        predicates:
          - Path=/api/test-rate-limit
          - Method=POST
      - id: routes-api
        uri: http://localhost:8082
        predicates:
          - Path=/api/routes
      - id: test-route
        uri: http://localhost:8082
        predicates:
          - Path=/test

# 新增：Actuator 配置（暴露健康检查端点）
management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO #全局的生产环境打印info及以上级别日志
    com.example.scg_project: DEBUG #日志级别设置为debug，开发环境打印所有级别日志，方便调试
    org.springframework.data.redis: DEBUG  # 新增：Redis 日志
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# 限流配置
ratelimit:
  limit: 5
  windowMs: 1000
